name: vaarta
description: "A Beautiful FOSS ai Interface, focused on Utility and Deep Integration with the OS."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.2.8+4
  shared_preferences: ^2.1.1
  uuid: ^4.5.1
  http: ^1.1.0
  google_generative_ai: ^0.4.6
  wakelock_plus: ^1.1.1
  flutter_riverpod: ^2.6.1
  flutter_markdown: ^0.6.18
  path_provider: ^2.1.2
  logging: ^1.2.0
  provider: ^6.0.5
  cupertino_icons: ^1.0.8
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
          weight: 400 # Specify a normal weight
        - asset: assets/fonts/Satoshi-VariableItalic.ttf
          style: italic
          weight: 400 # Specify a normal weight
    - family: FiraCode
      fonts:
        - asset: assets/fonts/FiraCode-VF.ttf
          weight: 400 # Specify a normal weight
